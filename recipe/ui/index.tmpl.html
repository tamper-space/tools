<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%2F%3E">
<title>Recipe</title>
<style>
/*FONTS_CSS*/
/*TOKENS_CSS*/
/*APP_CSS*/
</style>
</head>
<body>
<div id="cols">
  <section id="ops" class="pane">
    <div class="phead"><input id="opsearch" placeholder="Search operations..." spellcheck="false"></div>
    <div id="oplist"></div>
  </section>
  <section id="recipe" class="pane">
    <div class="phead"><span>Recipe</span><button id="clear" title="Remove all steps">Clear</button></div>
    <div id="steps"></div>
    <div id="recipe-empty" class="dim">Click an operation to add it.</div>
  </section>
  <section id="io" class="pane">
    <div class="iohead"><span>Input</span><span id="inlen" class="dim">0 bytes</span></div>
    <textarea id="input" spellcheck="false" placeholder="Type, paste, or open a file from the sidebar..."></textarea>
    <div class="iohead"><span>Output</span><span id="outlen" class="dim">0 bytes</span><button id="copy" title="Copy output">Copy</button></div>
    <textarea id="output" spellcheck="false" readonly></textarea>
  </section>
</div>
<script>/*WASM_EXEC*/</script>
<script>/*APP_JS*/</script>
<script>
const go = new Go();
const b = atob("__WASM_B64__");
const u = new Uint8Array(b.length);
for (let i = 0; i < b.length; i++) u[i] = b.charCodeAt(i);
WebAssembly.instantiate(u, go.importObject).then((r) => { go.run(r.instance); init(); });
</script>
</body>
</html>
