<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%2F%3E">
<title>Recipe</title>
<style>
/*FONTS_CSS*/
/*TOKENS_CSS*/
/*APP_CSS*/
</style>
</head>
<body>
<div id="cols">
  <section id="ops" class="pane">
    <div class="phead"><input id="opsearch" placeholder="Search operations..." spellcheck="false"></div>
    <div id="oplist"></div>
  </section>
  <div class="gutter" data-resize="ops" aria-hidden="true"></div>
  <section id="recipe" class="pane">
    <div class="phead"><span>Recipe</span><button id="clear" title="Remove all steps">Clear</button></div>
    <div id="stepbar" hidden>
      <button id="bp-prev" class="sb-btn" title="Step back" aria-label="Step back"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
      <span id="bp-label"></span>
      <button id="bp-next" class="sb-btn" title="Step forward" aria-label="Step forward"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
      <button id="bp-clear" class="sb-clear" title="Bake the full recipe">Full</button>
    </div>
    <div id="steps"></div>
    <div id="recipe-empty" class="dim">Click an operation to add it.</div>
  </section>
  <div class="gutter" data-resize="recipe" aria-hidden="true"></div>
  <section id="io" class="pane">
    <div id="tabs"></div>
    <div class="iohead">
      <span>Input</span>
      <span class="iotools">
        <span id="inlen" class="dim iostat">0 bytes</span>
        <select id="in-eol" class="iosel" title="Input line endings" aria-label="Input line endings"><option value="LF">LF</option><option value="CRLF">CRLF</option><option value="CR">CR</option></select>
        <select id="in-enc" class="iosel" title="Input encoding" aria-label="Input encoding"><option value="latin1">Latin-1</option><option value="utf8">UTF-8</option></select>
        <button id="magic-wand" class="iobtn" title="Magic: suggest decodings" aria-label="Magic: suggest decodings"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg></button>
        <button id="io-max" class="iobtn" title="Maximize the workspace" aria-label="Maximize the workspace"><span class="i-max"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg></span><span class="i-min"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg></span></button>
        <button id="in-clear" class="iobtn" title="Clear input" aria-label="Clear input"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </span>
    </div>
    <div id="magic-pop" hidden></div>
    <div id="inwrap">
      <div id="input-mirror" aria-hidden="true"></div>
      <textarea id="input" spellcheck="false" placeholder="Type, paste, or open a file from the sidebar..."></textarea>
    </div>
    <div class="iohead">
      <span>Output</span>
      <span class="iotools">
        <span id="outlen" class="dim iostat">0 bytes</span>
        <select id="out-enc" class="iosel" title="Output encoding" aria-label="Output encoding"><option value="latin1">Latin-1</option><option value="utf8">UTF-8</option></select>
        <button id="out-swap" class="iobtn" title="Set input to this output" aria-label="Output to input"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m17 11-5-5-5 5"/><path d="M12 6v12"/></svg></button>
        <button id="out-save" class="iobtn" title="Save output to a file" aria-label="Save output"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/></svg></button>
        <button id="copy" class="iobtn" title="Copy output" aria-label="Copy output"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
      </span>
    </div>
    <textarea id="output" spellcheck="false" readonly></textarea>
  </section>
</div>
<script>/*WASM_EXEC*/</script>
<script>/*APP_JS*/</script>
<script>
const go = new Go();
// TinyGo does not wire the stdlib's wasm randomness import (gojs.runtime.getRandomData),
// which crypto/rand (and thus RSA) needs. Provide it from the platform CSPRNG using the
// same (ptr,len) convention as TinyGo's other gojs imports. Guarded so the standard-Go
// build path, whose own wasm_exec.js defines this with a different ABI, is left untouched.
go.importObject.gojs = go.importObject.gojs || {};
if (!go.importObject.gojs["runtime.getRandomData"]) {
  go.importObject.gojs["runtime.getRandomData"] = (ptr, len) => {
    crypto.getRandomValues(new Uint8Array(go._inst.exports.memory.buffer, Number(ptr), Number(len)));
  };
}
const b = atob("__WASM_B64__");
const u = new Uint8Array(b.length);
for (let i = 0; i < b.length; i++) u[i] = b.charCodeAt(i);
WebAssembly.instantiate(u, go.importObject).then((r) => { go.run(r.instance); init(); });
</script>
</body>
</html>
